      <defs><linearGradient id="${id}" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="${shade(color,.18)}"/>
        <stop offset="1" stop-color="${shade(color,-.3)}"/>
      </linearGradient></defs>
      <circle cx="50" cy="50" r="48" fill="url(#${id})" stroke="${shade(color,.3)}" stroke-width="2"/>
      <text x="50" y="${initY}" text-anchor="middle" font-family="Archivo,sans-serif"
        font-weight="800" font-size="${(showNum&&num)?30:38}" fill="${txt}" dominant-baseline="${(showNum&&num)?'auto':'middle'}">${mono}</text>
      ${numText}
    </svg>`;
  }
  return { team, player, initials, shade, readable };
})();

/* ============================================================
   FIELD — geometry, zone detection, interactive diamond,
   and spray-chart rendering. Coordinate space is 0..100 on
   both axes; home plate sits bottom-center, outfield up top.
   ============================================================ */
const Field = (()=>{
  // canonical anchor points (x,y) in the 0..100 field space
  const HOME=[50,86], P1B=[68,68], P2B=[50,58], P3B=[32,68], PSS=[40,60], PSS2=[60,60];
  const MOUND=[50,66];
  // angle from home plate; 0deg = straight to 2B (center), negative=left, positive=right
  function angleDeg(x,y){
    const dx=x-HOME[0], dy=HOME[1]-y; // dy positive going up
    return Math.atan2(dx,dy)*180/Math.PI; // -=left field, +=right field
  }
  function dist(x,y){ const dx=x-HOME[0],dy=HOME[1]-y; return Math.sqrt(dx*dx+dy*dy); }

  // Map a tap to one of 11 named field zones (spec list).
  function zoneFor(x,y){
    const a=angleDeg(x,y), d=dist(x,y);
    // very close to home = catcher
    if(d<8) return {code:'C',name:'Catcher',area:'infield'};
    // pitcher: small zone around the mound (mound ~ d20, a0)
    if(d<22 && Math.abs(a)<16) return {code:'P',name:'Pitcher',area:'infield'};
    // infield radius
    const infield = d<34;
    if(infield){
      if(a<=-30) return {code:'3B',name:'Third Base',area:'infield'};
      if(a<  0)  return {code:'SS',name:'Shortstop',area:'infield'};
      if(a< 30)  return {code:'2B',name:'Second Base',area:'infield'};
      return {code:'1B',name:'First Base',area:'infield'};
    }
    // outfield by angle thirds + gaps
    if(a<=-30) return {code:'LF',name:'Left Field',area:'outfield'};
    if(a<=-12) return {code:'LC',name:'Left Center',area:'outfield'};
    if(a<  12) return {code:'CF',name:'Center Field',area:'outfield'};
    if(a<  30) return {code:'RC',name:'Right Center',area:'outfield'};
    return {code:'RF',name:'Right Field',area:'outfield'};
  }

  // big interactive diamond SVG. opts: {bases, armed, runners, lastHit}
  function bigDiamond(g, opts={}){
    const armed=opts.armed;
    const domRunners=opts.domRunners;  // when true, runner pucks are drawn as HTML overlay
    const baseOn=i=>g.bases[i]!=null && !domRunners;
    const runnerLabel=i=>{ const v=g.bases[i]; return v?Crest.initials(String(v)):''; };
    // grass + dirt
    return `<svg class="bigfield ${armed?'armed':''}" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"
        ${armed?'onclick="onFieldTap(event,this)"':''}>
      <defs>
        <radialGradient id="grass" cx="50%" cy="80%" r="80%">
          <stop offset="0%" stop-color="#1f6b3a"/><stop offset="100%" stop-color="#16502c"/>
        </radialGradient>
        <radialGradient id="dirt" cx="50%" cy="70%" r="50%">
          <stop offset="0%" stop-color="#9c6035"/><stop offset="100%" stop-color="#7d4a28"/>
        </radialGradient>
      </defs>
      <!-- outfield grass -->
      <path d="M50 86 L4 40 A64 64 0 0 1 96 40 Z" fill="url(#grass)"/>
      <!-- mowing arcs -->
      <path d="M50 86 L18 54 A46 46 0 0 1 82 54 Z" fill="rgba(255,255,255,.04)"/>
      <path d="M50 86 L30 64 A30 30 0 0 1 70 64 Z" fill="rgba(255,255,255,.05)"/>
      <!-- infield dirt -->
      <path d="M50 86 L34 70 A23 23 0 0 1 66 70 Z" fill="url(#dirt)"/>
      <circle cx="50" cy="66" r="6" fill="url(#dirt)"/>
      <!-- base lines -->
      <path d="M50 86 L68 68 M50 86 L32 68" stroke="rgba(255,255,255,.55)" stroke-width="1" fill="none"/>
      <!-- bases -->
    <!-- bases (occupancy always reflected on the bag; runner pucks drawn in overlay when domRunners) -->
    ${bag(68,68, g.bases[0]!=null, baseOn(0), runnerLabel(0), armed?0:null)}
    ${bag(50,58, g.bases[1]!=null, baseOn(1), runnerLabel(1), armed?1:null)}
    ${bag(32,68, g.bases[2]!=null, baseOn(2), runnerLabel(2), armed?2:null)}
      ${plate(50,86)}
      <!-- pitcher's rubber -->
      <rect x="48.5" y="65" width="3" height="1.4" rx=".4" fill="rgba(255,255,255,.7)"/>
      <!-- hit markers (current play arming preview handled in JS) -->
      ${(opts.markers||[]).map(m=>hitMarker(m)).join('')}
      ${armed?`<text x="50" y="50" text-anchor="middle" font-family="Archivo,sans-serif"
        font-size="5" font-weight="800" fill="rgba(255,255,255,.85)" class="tap-hint">TAP WHERE IT LANDED</text>`:''}
    </svg>`;
  }
  function bag(x,y,occupied,showPuck,label,baseIdx){
    const tap = baseIdx!=null ? `onclick="onBaseTap(${baseIdx},event)" style="cursor:pointer"` : '';
    return `<g ${tap}>
      <rect class="fbag ${occupied?'on':''}" x="${x-3.2}" y="${y-3.2}" width="6.4" height="6.4" rx="1"
        transform="rotate(45 ${x} ${y})"/>
      ${showPuck?`<circle cx="${x}" cy="${y}" r="4.6" class="frunner"/>
        <text x="${x}" y="${y+1.6}" text-anchor="middle" font-size="3.4" font-weight="800"
          fill="#0a0d14" font-family="Archivo,sans-serif">${label}</text>`:''}
    </g>`;
  }
  function plate(x,y){
    return `<polygon points="${x-2.4},${y-1} ${x+2.4},${y-1} ${x+2.4},${y+1} ${x},${y+2.6} ${x-2.4},${y+1}"
      fill="#fff" stroke="rgba(0,0,0,.3)" stroke-width=".3"/>`;
  }
  function hitMarker(m){
    const color = m.outType?'#ff5566':(m.color||'#ffc94d');
    const shape = m.bbType==='ground'
      ? `<circle cx="${m.x}" cy="${m.y}" r="2" fill="${color}" stroke="#0a0d14" stroke-width=".5"/>`
      : `<path d="M${m.x} ${m.y-2.4} L${m.x+2.1} ${m.y+1.4} L${m.x-2.1} ${m.y+1.4} Z"
           fill="${color}" stroke="#0a0d14" stroke-width=".5"/>`;
    return `<g class="hit-marker">${shape}</g>`;
  }

  // spray chart: small field with plotted markers from a list of hits
  function sprayChart(hits, opts={}){
    const id='sp'+Math.random().toString(36).slice(2,6);
    const markers = hits.map(h=>hitMarker(h)).join('');
    return `<svg class="spray" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
      <defs>
        <radialGradient id="grass-${id}" cx="50%" cy="80%" r="80%">
          <stop offset="0%" stop-color="#1f6b3a"/><stop offset="100%" stop-color="#16502c"/>
        </radialGradient>
        <radialGradient id="dirt-${id}" cx="50%" cy="70%" r="50%">
          <stop offset="0%" stop-color="#9c6035"/><stop offset="100%" stop-color="#7d4a28"/>
        </radialGradient>
      </defs>
      <path d="M50 86 L4 40 A64 64 0 0 1 96 40 Z" fill="url(#grass-${id})"/>
      <path d="M50 86 L34 70 A23 23 0 0 1 66 70 Z" fill="url(#dirt-${id})"/>
      <path d="M50 86 L68 68 M50 86 L32 68" stroke="rgba(255,255,255,.4)" stroke-width=".8" fill="none"/>
      ${plate(50,86)}
      ${markers}
    </svg>`;
  }

  // base anchor coordinates for runner dots in replay
  const BASE_XY = { 0:[68,68], 1:[50,58], 2:[32,68], 3:[50,86] }; // 3 = home
  function baseXY(i){ return BASE_XY[i]; }

  // Visual replay of a single play: shows ball flight + runner movement.
  // ev needs basesBefore/basesAfter/hx/hy (captured at record time).
  function replayField(ev){
    const id='rp'+Math.random().toString(36).slice(2,6);
    const before=ev.basesBefore||[null,null,null];
    const after=ev.basesAfter||[null,null,null];
    const hx=ev.hx, hy=ev.hy;

    // ball flight line from home plate to landing spot
    const ballPath = (hx!=null&&hy!=null)
      ? `<line x1="50" y1="86" x2="${hx}" y2="${hy}" stroke="#ffc94d" stroke-width="1.1"
           stroke-dasharray="2.5 2" class="ball-flight"/>
         ${hitMarker({x:hx,y:hy,bbType:ev.bbType,outType:ev.type==='out',
           color:ev.type==='out'?'#ff5566':(ev.bases===4?'#ffc94d':'#3ddc84')})}`
      : '';

    // runner movement arrows: for each runner present before, find where they went
    let arrows='', dots='';
    // batter starts at home (index -1 -> shown leaving plate)
    const moves=[];
    // existing runners (0,1,2) -> compare before/after by identity
    before.forEach((who,bi)=>{
      if(who==null) return;
      // find this runner in 'after'
      let dest=after.findIndex(a=>a===who);
      if(dest===-1) dest=3; // scored (or out) -> treat as home if scored
      if(dest!==bi) moves.push({from:bi,to:dest,who});
    });
    // batter: appears in 'after' but not 'before'
    after.forEach((who,ai)=>{
      if(who!=null && !before.includes(who)){
        moves.push({from:'H',to:ai,who,batter:true});
      }
    });

    moves.forEach(m=>{
      const from = m.from==='H'?[50,86]:baseXY(m.from);
      const to = baseXY(m.to);
      arrows+=`<line x1="${from[0]}" y1="${from[1]}" x2="${to[0]}" y2="${to[1]}"
        stroke="${m.batter?'#3ddc84':'#4d9fff'}" stroke-width="1.3" marker-end="url(#arr-${id})"
        class="runner-move" opacity=".9"/>`;
    });
    // dots at AFTER positions (current occupancy)
    after.forEach((who,ai)=>{
      if(who==null) return;
      const xy=baseXY(ai);
      dots+=`<g><circle cx="${xy[0]}" cy="${xy[1]}" r="4.4" fill="#ffc94d" stroke="#0a0d14" stroke-width=".6"/>
        <text x="${xy[0]}" y="${xy[1]+1.5}" text-anchor="middle" font-size="3.2" font-weight="800"
          fill="#0a0d14" font-family="Archivo,sans-serif">${Crest.initials(String(who))}</text></g>`;
    });

    return `<svg class="replay-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
      <defs>
        <radialGradient id="grass-${id}" cx="50%" cy="80%" r="80%">
          <stop offset="0%" stop-color="#1f6b3a"/><stop offset="100%" stop-color="#16502c"/>
        </radialGradient>
        <radialGradient id="dirt-${id}" cx="50%" cy="70%" r="50%">
          <stop offset="0%" stop-color="#9c6035"/><stop offset="100%" stop-color="#7d4a28"/>
        </radialGradient>
        <marker id="arr-${id}" markerWidth="5" markerHeight="5" refX="3.5" refY="2.5" orient="auto">
          <path d="M0 0 L5 2.5 L0 5 z" fill="#4d9fff"/>
        </marker>
      </defs>
      <path d="M50 86 L4 40 A64 64 0 0 1 96 40 Z" fill="url(#grass-${id})"/>
      <path d="M50 86 L18 54 A46 46 0 0 1 82 54 Z" fill="rgba(255,255,255,.04)"/>
      <path d="M50 86 L34 70 A23 23 0 0 1 66 70 Z" fill="url(#dirt-${id})"/>
      <path d="M50 86 L68 68 L50 58 L32 68 Z" fill="none" stroke="rgba(255,255,255,.45)" stroke-width=".7"/>
      ${['0','1','2'].map(i=>{const xy=baseXY(+i);
        return `<rect x="${xy[0]-2.6}" y="${xy[1]-2.6}" width="5.2" height="5.2" rx=".8"
          transform="rotate(45 ${xy[0]} ${xy[1]})" fill="rgba(255,255,255,.25)" stroke="rgba(255,255,255,.6)" stroke-width=".6"/>`;
      }).join('')}
      ${plate(50,86)}
      ${ballPath}
      ${arrows}
      ${dots}
    </svg>`;
  }

  return { zoneFor, bigDiamond, sprayChart, replayField, angleDeg, dist, HOME, baseXY };
})();

/* ============================================================
   STANDINGS / LEADERS — derived from saved game history.
   Matches teams by name (until session-stats wires player ids
   into the live game). Good enough to make the dashboard real.
   ============================================================ */
const Standings = (()=>{
  function compute(seasonId){
    const s=Store.get();
    const rec={}; // name -> {w,l,t,rf,ra,games}
    const ensure=n=>rec[n]||(rec[n]={name:n,w:0,l:0,t:0,rf:0,ra:0,games:0});
    let games=s.history;
    if(seasonId) games=games.filter(g=>g.seasonId===seasonId);
    games.forEach(g=>{
      const a=ensure(g.away.name), h=ensure(g.home.name);
      const ar=g.totals.away.r, hr=g.totals.home.r;
      a.rf+=ar;a.ra+=hr;h.rf+=hr;h.ra+=ar;a.games++;h.games++;
      if(ar>hr){a.w++;h.l++;} else if(hr>ar){h.w++;a.l++;} else {a.t++;h.t++;}
    });
    // attach crest color from saved teams when available
    Object.values(rec).forEach(r=>{
      const t=s.teams.find(t=>t.name===r.name);
      r.color=t?t.color:'#ff6b35';
      r.pct=r.games?((r.w+r.t*0.5)/r.games):0;
      r.diff=r.rf-r.ra;
    });
    return Object.values(rec).sort((a,b)=>b.pct-a.pct||b.diff-a.diff);
  }
  function teamRecord(name,seasonId){
    const r=compute(seasonId).find(x=>x.name===name);
    return r||{w:0,l:0,t:0,rf:0,ra:0,games:0,pct:0,diff:0};
  }
  function recentResults(limit=5){
    return Store.get().history.slice(0,limit);
  }
  return { compute, teamRecord, recentResults };
})();

/* ============================================================
   STATS ENGINE — derives player stats from game events.
   Pure + event-sourced: never stored separately, always
   recomputed from the scorebook. Same philosophy as undo.

   Plate-appearance accounting (slow-pitch / rec friendly):
     AB excludes walks and sacrifice flies.
     Hits: 1B/2B/3B/HR by `bases`. K and outs are AB outs.
     OBP = (H + BB) / (AB + BB + SF)
     SLG = total bases / AB ;  OPS = OBP + SLG
   ============================================================ */
const Stats = (()=>{
  function blankBat(){
    return {pa:0,ab:0,h:0,b1:0,b2:0,b3:0,hr:0,bb:0,k:0,rbi:0,r:0,sb:0,sf:0,tb:0,games:0};
  }
  function blankPitch(){ return {outs:0,h:0,bb:0,k:0,r:0,bf:0,games:0}; }
  function blankField(){ return {po:0,a:0,e:0,games:0}; }

  // tally one game's events into maps keyed by playerId
  function tallyGame(g, bat, pitch, field){
    const seenBat=new Set(), seenPitch=new Set();
    g.events.forEach(ev=>{
      const id=ev.batterId;
      if(id){
        const b=bat[id]||(bat[id]=blankBat());
        if(!seenBat.has(id)){ b.games++; seenBat.add(id); }
        accumBat(b,ev);
      }
      const pid=ev.pitcherId;
      if(pid){
        const p=pitch[pid]||(pitch[pid]=blankPitch());
        if(!seenPitch.has(pid)){ p.games++; seenPitch.add(pid); }
        accumPitch(p,ev);
      }
    });
  }

  function accumBat(b,ev){
    switch(ev.type){
      case 'hit':{
        b.pa++; b.ab++; b.h++; b.tb+=ev.bases||1;
        if(ev.bases===1)b.b1++; else if(ev.bases===2)b.b2++;
        else if(ev.bases===3)b.b3++; else if(ev.bases===4)b.hr++;
        b.rbi+=ev.rbi||0; break;
      }
      case 'walk': b.pa++; b.bb++; break;
      case 'k': b.pa++; b.ab++; b.k++; break;
      case 'out': b.pa++; b.ab++; break;
      case 'dp': b.pa++; b.ab++; break;
      case 'fc': b.pa++; b.ab++; break;
      case 'sac': b.pa++; b.sf++; b.rbi+=ev.rbi||0; break;  // SF: not an AB
      case 'error': b.pa++; b.ab++; break;                  // reached on error = AB, no hit
      case 'sb': b.sb++; break;                             // baserunning, not a PA
      // 'run' is a team event, runner R credited below
    }
  }
  function accumPitch(p,ev){
    // pitcher faces the batter on PA-producing events
    if(['hit','walk','k','out','dp','fc','sac','error'].includes(ev.type)){
      p.bf++;
      if(ev.type==='hit')p.h++;
      if(ev.type==='walk')p.bb++;
      if(ev.type==='k')p.k++;
      // outs recorded
      if(ev.type==='k'||ev.type==='out'||ev.type==='fc'||ev.type==='error'&&false) p.outs+=1;
      if(ev.type==='sac') p.outs+=1;
      if(ev.type==='dp') p.outs+=2;
      p.r+=ev.rbi||0; // earned-ish: runs driven in while pitching (approx)
    }
  }

  // derived rate stats
  function avg(b){ return b.ab? b.h/b.ab : 0; }
  function obp(b){ const d=b.ab+b.bb+b.sf; return d? (b.h+b.bb)/d : 0; }
  function slg(b){ return b.ab? b.tb/b.ab : 0; }
  function ops(b){ return obp(b)+slg(b); }
  function era(p,innings){ const ip=p.outs/3; return ip? (p.r*(innings||7))/ip : 0; }
  function whip(p){ const ip=p.outs/3; return ip? (p.bb+p.h)/ip : 0; }
  function ipStr(p){ const whole=Math.floor(p.outs/3), rem=p.outs%3; return `${whole}.${rem}`; }

  // build full league stat tables across all history (+ optional live game)
  // Build stat tables. opts: {includeLive, seasonId}
  //   seasonId omitted/null => CAREER (all seasons).
  //   seasonId set          => only that season's games.
  function league(opts){
    // back-compat: league(true) means includeLive+career; league(false) means no live
    if(opts===true||opts===undefined) opts={includeLive:true};
    else if(opts===false) opts={includeLive:false};
    const {includeLive=true, seasonId=null} = opts;
    const s=Store.get();
    const bat={}, pitch={}, field={};
    let games=[...s.history];
    if(includeLive && s.game) games.push(s.game);
    if(seasonId) games=games.filter(g=>g.seasonId===seasonId);
    games.forEach(g=>tallyGame(g,bat,pitch,field));
    return {bat,pitch,field};
  }

  function playerBatting(playerId,includeLive=true,seasonId=null){
    return league({includeLive,seasonId}).bat[playerId]||blankBat();
  }
  function playerPitching(playerId,includeLive=true,seasonId=null){
    return league({includeLive,seasonId}).pitch[playerId]||blankPitch();
  }

  // leaders for a given batting stat (min AB filter for rate stats)
  function leaders(stat,opts={}){
    const {bat}=league({includeLive:true, seasonId:opts.seasonId||null});
    const min=opts.minAB||0;
    const counting=['hr','rbi','h','sb','bb','r','b2','b3','tb','b1','k'];
    const rows=Object.entries(bat).map(([id,b])=>({id,b}))
      .filter(x=>counting.includes(stat) || x.b.ab>=min);
    const val=x=>{
      switch(stat){
        case 'avg':return avg(x.b); case 'obp':return obp(x.b);
        case 'slg':return slg(x.b); case 'ops':return ops(x.b);
        case 'hr':return x.b.hr; case 'rbi':return x.b.rbi;
        case 'h':return x.b.h; case 'sb':return x.b.sb; case 'bb':return x.b.bb;
        case 'b1':return x.b.b1; case 'b2':return x.b.b2; case 'b3':return x.b.b3;
        case 'tb':return x.b.tb; case 'k':return x.b.k; case 'r':return x.b.r;
        default:return 0;
      }
    };
    return rows.map(x=>({id:x.id,val:val(x),b:x.b}))
      .filter(x=>x.val>0).sort((a,b)=>b.val-a.val);
  }

  // leaders for pitching stats. ERA/WHIP sort ascending (lower=better).
  function pitchLeaders(stat,opts={}){
    const {pitch}=league({includeLive:true, seasonId:opts.seasonId||null});
    const minOuts=opts.minOuts||0;
    const ascending = stat==='era'||stat==='whip';
    const rows=Object.entries(pitch).map(([id,p])=>({id,p}))
      .filter(x=>x.p.outs>=minOuts && x.p.bf>0);
    const val=x=>{
      switch(stat){
        case 'k':return x.p.k; case 'bb':return x.p.bb;
        case 'era':return era(x.p); case 'whip':return whip(x.p);
        case 'ip':return x.p.outs/3; case 'bf':return x.p.bf;
        case 'h':return x.p.h;
        default:return 0;
      }
    };
    return rows.map(x=>({id:x.id,val:val(x),p:x.p}))
      .filter(x=> ascending ? x.p.outs>0 : x.val>0)
      .sort((a,b)=> ascending ? a.val-b.val : b.val-a.val);
  }

  // Resolve a leaders() result into display rows with player + team attached.
  function leaderTable(kind, stat, opts={}){
    const raw = kind==='pitch' ? pitchLeaders(stat,opts) : leaders(stat,opts);
    return raw.map(x=>{
      const r=resolve(x.id);
      return { id:x.id, val:x.val, line:x.b||x.p,
               name:r?r.player.name:'—', num:r?r.player.num:'',
               teamName:r?r.team.name:'', color:r?r.team.color:'#ff6b35',
               teamId:r?r.team.id:null };
    }).filter(x=>x.teamId); // only ranked, resolvable players
  }

  // resolve a playerId to {player, team} across all saved teams
  function resolve(playerId){
    for(const t of Store.get().teams){
      const p=t.players.find(p=>p.id===playerId);
      if(p) return {player:p,team:t};
    }
    return null;
  }

  // ---- SPRAY CHART data ----
  // collect every batted-ball with a recorded location, optionally filtered
  // by playerId or teamId. Returns markers ready for Field.sprayChart().
  function sprayData(filter={}, includeLive=true){
    const s=Store.get();
    const games=[...s.history];
    if(includeLive && s.game) games.push(s.game);
    const out=[];
    games.forEach(g=>{
      g.events.forEach(ev=>{
        if(ev.hx==null||ev.hy==null) return;             // only located balls
        if(filter.playerId && ev.batterId!==filter.playerId) return;
        if(filter.teamId && ev.teamId!==filter.teamId) return;
        const isOut = ev.type==='out';
        out.push({x:ev.hx, y:ev.hy, bbType:ev.bbType||null,
          outType:isOut, label:ev.label, zone:ev.zone,
          color:isOut?'#ff5566':(ev.bases===4?'#ffc94d':'#3ddc84')});
      });
    });
    return out;
  }
  function sprayCount(filter={}){ return sprayData(filter).length; }

  // ---- CAREER / SEASON helpers ----
  // Per-season batting + pitching lines for a player, newest first.
  function seasonBreakdown(playerId){
    const s=Store.get();
    return (s.seasons||[]).map(season=>({
      season,
      bat: playerBatting(playerId, true, season.id),
      pitch: playerPitching(playerId, true, season.id)
    })).filter(r=> r.bat.pa>0 || r.pitch.bf>0)
       .sort((a,b)=> b.season.created - a.season.created);
  }
  function careerBatting(playerId){ return playerBatting(playerId, true, null); }
  function careerPitching(playerId){ return playerPitching(playerId, true, null); }

  // Milestone detection on career totals. Returns achieved badges.
  const BAT_MILESTONES=[
    {stat:'h',  marks:[5,10,25,50,100,250], label:'Hits'},
    {stat:'hr', marks:[1,5,10,25,50],       label:'Home Runs'},
    {stat:'rbi',marks:[5,10,25,50,100],     label:'RBI'},
    {stat:'sb', marks:[5,10,25],            label:'Steals'},
  ];
  const PITCH_MILESTONES=[
    {stat:'k', marks:[5,10,25,50,100], label:'Strikeouts'},
  ];
  function milestones(playerId){
    const cb=careerBatting(playerId), cp=careerPitching(playerId);
    const out=[];
    BAT_MILESTONES.forEach(m=>{
      const v=cb[m.stat]||0;
      const hit=[...m.marks].reverse().find(mk=>v>=mk);
      if(hit) out.push({label:`${hit} ${m.label}`, value:v, kind:'bat'});
    });
    PITCH_MILESTONES.forEach(m=>{
      const v=cp[m.stat]||0;
      const hit=[...m.marks].reverse().find(mk=>v>=mk);
      if(hit) out.push({label:`${hit} ${m.label}`, value:v, kind:'pitch'});
    });
    return out;
  }

  // ---- LIVE BOX SCORE for a single game ----
  // Returns per-team batting + pitching lines plus team totals & LOB.
  function gameBox(g){
    const bat={}, pitch={}, field={};
    tallyGame(g, bat, pitch, field);   // tally just this game's events
    // split players by side using the side recorded on events
    const sides={away:{batters:[],pitchers:[]}, home:{batters:[],pitchers:[]}};
    const batSide={}, pitchSide={};
    g.events.forEach(ev=>{
      if(ev.batterId && ev.side) batSide[ev.batterId]=ev.side;
      if(ev.pitcherId){ // pitcher belongs to the FIELDING side (opposite of batting side)
        pitchSide[ev.pitcherId]= ev.side==='away'?'home':'away';
      }
    });
    Object.entries(bat).forEach(([id,b])=>{
      const side=batSide[id]; if(!side) return;
      const r=resolve(id);
      sides[side].batters.push({id,name:r?r.player.name:id,num:r?r.player.num:'',line:b});
    });
    Object.entries(pitch).forEach(([id,p])=>{
      const side=pitchSide[id]; if(!side) return;
      const r=resolve(id);
      sides[side].pitchers.push({id,name:r?r.player.name:id,num:r?r.player.num:'',line:p});
    });
    // left on base: runners still on at the time the half ended — approximate
    // from total baserunners reached minus those who scored/were out. Simpler:
    // count walks+hits+errors that reached, minus runs, minus outs-on-base.
    const lob={away:0,home:0};
    // tally reached vs scored per side from events
    const reached={away:0,home:0}, scored={away:0,home:0};
    g.events.forEach(ev=>{
      const side=ev.side; if(!side) return;
      if(['hit','walk','error'].includes(ev.type)) reached[side]++;
      scored[side]+= (ev.rbi||0) + (ev.type==='run'?1:0);
    });
    // crude LOB: reached minus scored, floored at 0 (HRs reach+score so net 0)
    ['away','home'].forEach(s=>{ lob[s]=Math.max(0, reached[s]-scored[s]); });

    return {
      sides,
      totals:{
        away:{r:g.totals.away.r, h:g.totals.away.h, e:g.totals.away.e, lob:lob.away},
        home:{r:g.totals.home.r, h:g.totals.home.h, e:g.totals.home.e, lob:lob.home}
      }
    };
  }

  return { blankBat, blankPitch, avg, obp, slg, ops, era, whip, ipStr,
           league, playerBatting, playerPitching, leaders, pitchLeaders, leaderTable, resolve,
           sprayData, sprayCount,
           seasonBreakdown, careerBatting, careerPitching, milestones, gameBox };
})();

/* ============================================================
   AWARDS & RECORDS — all derived from games + stats, scoped by
   season (or career when seasonId is null). Nothing stored.
   ============================================================ */
const Awards = (()=>{

  // ---- Seasonal player awards ----
  // MVP = best OPS-weighted overall bat line with volume; Offensive POY =
  // most total bases + RBI; Pitcher of Year = best ERA among qualified;
  // Defensive POY (no fielding stats yet) -> best fielding pos player by
  // a simple proxy (most games at a non-EH position) — flagged provisional.
  function seasonAwards(seasonId){
    const {bat,pitch}=Stats.league({includeLive:true, seasonId});
    const out=[];

    // helper to make an award row from a playerId
    const make=(title,playerId,detail)=>{
      const r=Stats.resolve(playerId); if(!r) return null;
      return {title, playerId, name:r.player.name, num:r.player.num,
              teamName:r.team.name, teamId:r.team.id, color:r.team.color, detail};
    };

    // MVP — composite: OPS * sqrt(PA) to reward both rate and volume
    let mvp=null,mvpScore=-1;
    Object.entries(bat).forEach(([id,b])=>{
      if(b.pa<3) return;
      const score=Stats.ops(b)*Math.sqrt(b.pa) + b.rbi*0.15 + b.hr*0.3;
      if(score>mvpScore){ mvpScore=score; mvp=id; }
    });
    if(mvp){ const b=bat[mvp];
      const a=make('MVP',mvp,`${fmt3(Stats.ops(b))} OPS · ${b.hr} HR · ${b.rbi} RBI`); if(a)out.push(a); }

    // Offensive Player of the Year — most total bases (+RBI tiebreak)
    let opoy=null,opoyScore=-1;
    Object.entries(bat).forEach(([id,b])=>{
      const score=b.tb*2+b.rbi;
      if(score>opoyScore && b.ab>0){ opoyScore=score; opoy=id; }
    });
    if(opoy && opoy!==mvp){ const b=bat[opoy];
      const a=make('Offensive Player of the Year',opoy,`${b.tb} TB · ${b.rbi} RBI · ${b.hr} HR`); if(a)out.push(a); }

    // Pitcher of the Year — lowest ERA among those with >=3 outs
    let poy=null,poyEra=Infinity;
    Object.entries(pitch).forEach(([id,p])=>{
      if(p.outs<3) return;
      const e=Stats.era(p);
      if(e<poyEra){ poyEra=e; poy=id; }
    });
    if(poy){ const p=pitch[poy];
      const a=make('Pitcher of the Year',poy,`${Stats.era(p).toFixed(2)} ERA · ${p.k} K · ${Stats.ipStr(p)} IP`); if(a)out.push(a); }

    // Most Improved — needs >=2 seasons; compare this season vs prior OPS
    const mip=mostImproved(seasonId, bat);
    if(mip) out.push(mip);

    return out;
  }

  // Most Improved: only meaningful for a specific season with a prior one.
  function mostImproved(seasonId, curBat){
    if(!seasonId) return null;
    const seasons=(Store.get().seasons||[]).slice().sort((a,b)=>a.created-b.created);
    const idx=seasons.findIndex(s=>s.id===seasonId);
    if(idx<=0) return null;                    // no prior season
    const prevId=seasons[idx-1].id;
    const prev=Stats.league({includeLive:true, seasonId:prevId}).bat;
    let best=null,bestGain=0.15;                // require a real jump
    Object.entries(curBat).forEach(([id,b])=>{
      if(b.pa<3) return;
      const pb=prev[id]; if(!pb||pb.pa<3) return;
      const gain=Stats.ops(b)-Stats.ops(pb);
      if(gain>bestGain){ bestGain=gain; best=id; }
    });
    if(!best) return null;
    const r=Stats.resolve(best); if(!r) return null;
    return {title:'Most Improved', playerId:best, name:r.player.name, num:r.player.num,
            teamName:r.team.name, teamId:r.team.id, color:r.team.color,
            detail:`+${fmt3(bestGain)} OPS vs prior season`};
  }

  // ---- Team records (single-game + season extremes) ----
  function teamRecords(seasonId){
    const s=Store.get();
    let games=s.history.slice();
    if(seasonId) games=games.filter(g=>g.seasonId===seasonId);
    const recs=[];
    if(!games.length) return recs;

    // Most runs in a game (by one team)
    let topRuns={runs:-1};
    games.forEach(g=>{
      [['away',g.away.name],['home',g.home.name]].forEach(([side,name])=>{
        const r=g.totals[side].r;
        if(r>topRuns.runs) topRuns={runs:r,team:name,g};
      });
    });
    if(topRuns.runs>0) recs.push({label:'Most Runs in a Game', value:topRuns.runs,
      team:topRuns.team, sub:gameLabel(topRuns.g)});

    // Largest margin of victory
    let topMargin={m:-1};
    games.forEach(g=>{
      const m=Math.abs(g.totals.away.r-g.totals.home.r);
      const winner=g.totals.away.r>g.totals.home.r?g.away.name:g.home.name;
      if(m>topMargin.m) topMargin={m,winner,g};
    });
    if(topMargin.m>0) recs.push({label:'Largest Margin of Victory', value:topMargin.m,
      team:topMargin.winner, sub:gameLabel(topMargin.g)});

    // Longest winning streak (per team, chronological)
    const streak=longestStreak(games);
    if(streak.len>1) recs.push({label:'Longest Win Streak', value:streak.len,
      team:streak.team, sub:'consecutive wins'});

    // Highest team batting average (season aggregate from box hits/at-bats proxy via H and outs)
    // We approximate team AVG from per-team batting lines tallied across season.
    const teamAvg=highestTeamAvg(seasonId);
    if(teamAvg) recs.push({label:'Highest Team Avg', value:fmt3(teamAvg.avg),
      team:teamAvg.team, sub:`${teamAvg.h}-for-${teamAvg.ab}`});

    return recs;
  }

  function gameLabel(g){
    return `${g.away.name} ${g.totals.away.r}–${g.totals.home.r} ${g.home.name}`;
  }

  function longestStreak(games){
    // games come newest-first in history; sort oldest-first
    const chron=games.slice().sort((a,b)=>a.created-b.created);
    const cur={}; let best={len:0,team:null};
    chron.forEach(g=>{
      const aw=g.totals.away.r, hw=g.totals.home.r;
      const winner = aw>hw?g.away.name : hw>aw?g.home.name : null;
      const loser  = aw>hw?g.home.name : hw>aw?g.away.name : null;
      if(winner){
        cur[winner]=(cur[winner]||0)+1;
        if(cur[winner]>best.len) best={len:cur[winner],team:winner};
        if(loser) cur[loser]=0;
      } else { // tie breaks both
        cur[g.away.name]=0; cur[g.home.name]=0;
      }
    });
    return best;
  }

  // team batting average from player bat lines summed by team
  function highestTeamAvg(seasonId){
    const {bat}=Stats.league({includeLive:true, seasonId});
    const byTeam={};
    Object.entries(bat).forEach(([id,b])=>{
      const r=Stats.resolve(id); if(!r) return;
      const t=byTeam[r.team.name]||(byTeam[r.team.name]={h:0,ab:0,team:r.team.name});
      t.h+=b.h; t.ab+=b.ab;
    });
    let best=null;
    Object.values(byTeam).forEach(t=>{
      if(t.ab<5) return;
      const avg=t.h/t.ab;
      if(!best||avg>best.avg) best={...t,avg};
    });
    return best;
  }

  function fmt3(v){ return v>=1?v.toFixed(3):('.'+Math.round(v*1000).toString().padStart(3,'0')); }

  // ---- Game MVP history ----
  // Count Game MVP awards per player, optionally scoped to a season.
  function mvpHistory(seasonId){
    const s=Store.get();
    let games=s.history.filter(g=>g.mvpId);
    if(seasonId) games=games.filter(g=>g.seasonId===seasonId);
    const counts={};
    games.forEach(g=>{
      const c=counts[g.mvpId]||(counts[g.mvpId]={playerId:g.mvpId, total:0, games:[]});
      c.total++; c.games.push(g);
    });
    return Object.values(counts).map(c=>{
      const r=Stats.resolve(c.playerId);
      return {...c, name:r?r.player.name:'—', num:r?r.player.num:'',
              teamName:r?r.team.name:'', teamId:r?r.team.id:null, color:r?r.team.color:'#ff6b35'};
    }).filter(c=>c.teamId).sort((a,b)=>b.total-a.total);
  }
  // total MVP count for one player (career)
  function playerMvpCount(playerId){
    return Store.get().history.filter(g=>g.mvpId===playerId).length;
  }

  return { seasonAwards, teamRecords, mvpHistory, playerMvpCount };
})();

/* ============================================================
   SCHEDULE — games, practices, tournaments + per-player RSVPs.
   Each event: {id,type,title,teamId,oppName,start(ISO),location,
   notes,seasonId,rsvps:{playerId:'in'|'out'|'maybe'}}
   ============================================================ */
const Schedule = (()=>{
  const TYPES={
    game:{label:'Game', icon:'⚾', color:'#ff6b35'},
    practice:{label:'Practice', icon:'🧢', color:'#4d9fff'},
    tournament:{label:'Tournament', icon:'🏆', color:'#ffc94d'},
    event:{label:'Event', icon:'📅', color:'#9b8cff'},
  };
  function all(){ return (Store.get().schedule||[]).slice(); }
  function upcoming(){
    const now=Date.now();
    return all().filter(e=>new Date(e.start).getTime()>=now-12*3600*1000)
                .sort((a,b)=>new Date(a.start)-new Date(b.start));
  }
  function past(){
    const now=Date.now();
    return all().filter(e=>new Date(e.start).getTime()<now-12*3600*1000)
                .sort((a,b)=>new Date(b.start)-new Date(a.start));
  }
  function byId(id){ return all().find(e=>e.id===id); }
  let _seq=0;
  function create(data){
    const e=Object.assign({
      id:'ev'+Date.now()+'_'+(_seq++), type:'game', title:'', teamId:null, oppName:'',
      start:new Date().toISOString(), location:'', notes:'',
      seasonId:Store.get().currentSeasonId||null, rsvps:{}
    }, data);
    Store.get().schedule.push(e);
    return e;
  }
  function update(id,data){
    const e=byId(id); if(!e) return null;
    Object.assign(e,data); return e;
  }
  function remove(id){
    const s=Store.get(); s.schedule=s.schedule.filter(e=>e.id!==id);
  }
  function setRsvp(eventId,playerId,status){
    const e=byId(eventId); if(!e) return;
    if(!e.rsvps) e.rsvps={};
    if(status==null) delete e.rsvps[playerId];
    else e.rsvps[playerId]=status;
  }
  // RSVP tally for an event: {in,out,maybe,pending,total}
  function rsvpTally(e){
    const team=e.teamId?Store.get().teams.find(t=>t.id===e.teamId):null;
    const roster=team?team.players:[];
    const r={in:0,out:0,maybe:0,pending:0,total:roster.length};
    roster.forEach(p=>{
      const st=(e.rsvps||{})[p.id];
      if(st==='in') r.in++; else if(st==='out') r.out++;
      else if(st==='maybe') r.maybe++; else r.pending++;
    });
    return r;
  }
  return { TYPES, all, upcoming, past, byId, create, update, remove, setRsvp, rsvpTally };
})();

/* ============================================================
   TOURNAMENTS — single elim, double elim, round robin.
   A tournament has teams[], format, and matches[]. Matches carry
   slots (teamId or {from:'winner'|'loser', match}), scores, winner.
   Advancement is derived: when a match gets a result, dependent
   slots resolve automatically.
   ============================================================ */
const Tournament = (()=>{
  let _seq=0;
  const uid = p => p+Date.now()+'_'+(_seq++);

  const FORMATS={
    single:{label:'Single Elimination', icon:'🥇'},
    double:{label:'Double Elimination', icon:'🥈'},
    roundrobin:{label:'Round Robin', icon:'🔄'},
  };

  function all(){ return (Store.get().tournaments||[]).slice(); }
  function byId(id){ return all().find(t=>t.id===id); }
  function remove(id){ const s=Store.get(); s.tournaments=s.tournaments.filter(t=>t.id!==id); }

  // create + generate the bracket structure
  function create({name, format, teamIds, seasonId}){
    const t={
      id:uid('tn'), name:name||'Tournament', format:format||'single',
      teamIds:teamIds.slice(), seasonId:seasonId||Store.get().currentSeasonId||null,
      created:Date.now(), matches:[], champion:null
    };
    if(format==='roundrobin') t.matches=genRoundRobin(teamIds);
    else if(format==='double') t.matches=genDoubleElim(teamIds);
    else t.matches=genSingleElim(teamIds);
    Store.get().tournaments.push(t);
    return t;
  }

  // ---- seeding helper: standard bracket seeding order for n (power of 2) ----
  function seedOrder(n){
    let seeds=[1,2];
    while(seeds.length<n){
      const next=[]; const len=seeds.length*2+1;
      seeds.forEach(s=>{ next.push(s); next.push(len-s); });
      seeds=next;
    }
    return seeds; // 1-indexed seed positions
  }
  function nextPow2(n){ let p=1; while(p<n)p*=2; return p; }

  // ---- SINGLE ELIMINATION ----
  function genSingleElim(teamIds){
    const n=teamIds.length;
    const size=nextPow2(n);
    const order=seedOrder(size);
    // round 1 pairings from seed order; byes where seed > n
    const matches=[];
    const r1=[];
    for(let i=0;i<size;i+=2){
      const sa=order[i], sb=order[i+1];
      const a=sa<=n?teamIds[sa-1]:null;  // null = bye
      const b=sb<=n?teamIds[sb-1]:null;
      r1.push({a,b});
    }
    let round=1, prevIds=[];
    r1.forEach((p,idx)=>{
      const m={id:uid('m'), round, bracket:'w', slot:idx,
        a:p.a?{teamId:p.a}:null, b:p.b?{teamId:p.b}:null,
        scoreA:null, scoreB:null, winner:null, bye:false};
      // auto-resolve byes
      if(p.a && !p.b){ m.winner='a'; m.bye=true; }
      else if(!p.a && p.b){ m.winner='b'; m.bye=true; }
      matches.push(m); prevIds.push(m.id);
    });
    // subsequent rounds reference winners of prior matches
    let count=prevIds.length;
    while(count>1){
      round++;
      const next=[];
      for(let i=0;i<count;i+=2){
        const m={id:uid('m'), round, bracket:'w', slot:i/2,
          a:{from:'winner', match:prevIds[i]},
          b:{from:'winner', match:prevIds[i+1]},
          scoreA:null, scoreB:null, winner:null, bye:false};
        matches.push(m); next.push(m.id);
      }
      prevIds=next; count=next.length;
    }
    // resolve any byes forward immediately
    resolveByes(matches);
    return matches;
  }

  // propagate bye winners into dependent slots
  function resolveByes(matches){
    let changed=true;
    while(changed){
      changed=false;
      matches.forEach(m=>{
        if(m.winner && m.bye){
          const wId=winnerTeamId(m, matches);
          matches.forEach(dep=>{
            ['a','b'].forEach(side=>{
              const slot=dep[side];
              if(slot && slot.from==='winner' && slot.match===m.id && !dep._resolved_+side){
                // leave as reference; resolution is computed live in teamInSlot
              }
            });
          });
        }
      });
    }
  }

  // ---- ROUND ROBIN ----
  function genRoundRobin(teamIds){
    const matches=[]; let slot=0;
    for(let i=0;i<teamIds.length;i++){
      for(let j=i+1;j<teamIds.length;j++){
        matches.push({id:uid('m'), round:1, bracket:'rr', slot:slot++,
          a:{teamId:teamIds[i]}, b:{teamId:teamIds[j]},
          scoreA:null, scoreB:null, winner:null, bye:false});
      }
    }
    return matches;
  }

  // ---- DOUBLE ELIMINATION (simplified, correct for up to 8 teams) ----
  function genDoubleElim(teamIds){
    // build winners bracket like single elim
    const w=genSingleElim(teamIds);
    w.forEach(m=>m.bracket='w');
    // losers bracket: created structurally; teams flow in as they lose.
    // For a clean local implementation we generate L-bracket match shells
    // sized to absorb losers. Number of L matches = (size-1) - 1.
    const size=nextPow2(teamIds.length);
    const wRounds=Math.log2(size);
    const losers=[];
    // simplified: one consolidation chain. Each W-round feeds losers in.
    let lSlot=0;
    for(let r=1;r<wRounds*2;r++){
      // create shells; they reference 'loser' from winners and 'winner' from losers
      losers.push({id:uid('m'), round:r, bracket:'l', slot:lSlot++,
        a:null, b:null, scoreA:null, scoreB:null, winner:null, bye:false, _placeholder:true});
    }
    // grand final
    const gf={id:uid('m'), round:99, bracket:'gf', slot:0,
      a:{from:'champion', bracket:'w'}, b:{from:'champion', bracket:'l'},
      scoreA:null, scoreB:null, winner:null, bye:false};
    return [...w, ...losers, gf];
  }

  // ---- resolve which team currently occupies a slot ----
  function teamInSlot(slot, matches){
    if(!slot) return null;
    if(slot.teamId) return slot.teamId;
    if(slot.from==='winner'){
      const m=matches.find(x=>x.id===slot.match);
      return m && m.winner ? winnerTeamId(m, matches) : null;
    }
    if(slot.from==='loser'){
      const m=matches.find(x=>x.id===slot.match);
      return m && m.winner ? loserTeamId(m, matches) : null;
    }
    if(slot.from==='champion'){
      // final champion of a bracket (winners or losers)
      const bms=matches.filter(x=>x.bracket===slot.bracket);
      const last=bms.sort((a,b)=>b.round-a.round||b.slot-a.slot)[0];
      return last && last.winner ? winnerTeamId(last, matches) : null;
    }
    return null;
  }
  function winnerTeamId(m, matches){
    if(!m.winner) return null;
    return teamInSlot(m.winner==='a'?m.a:m.b, matches);
  }
  function loserTeamId(m, matches){
    if(!m.winner) return null;
    return teamInSlot(m.winner==='a'?m.b:m.a, matches);
  }

  // ---- record a result on a match ----
  function setResult(tId, matchId, scoreA, scoreB){
    const t=byId(tId); if(!t) return;
    const m=t.matches.find(x=>x.id===matchId); if(!m) return;
    m.scoreA=scoreA; m.scoreB=scoreB;
    m.winner = scoreA>scoreB?'a':scoreB>scoreA?'b':null;
    updateChampion(t);
  }
  function clearResult(tId, matchId){
    const t=byId(tId); if(!t) return;
    const m=t.matches.find(x=>x.id===matchId); if(!m||m.bye) return;
    m.scoreA=null; m.scoreB=null; m.winner=null;
    updateChampion(t);
  }
  function updateChampion(t){
    if(t.format==='roundrobin'){
      const st=standings(t);
      t.champion = (st.length && st[0].played>0 && allPlayed(t)) ? st[0].teamId : null;
      return;
    }
    // elimination: champion = winner of the final match (highest round)
    const finals=t.matches.filter(m=>m.bracket==='w'||m.bracket==='gf');
    const last=finals.sort((a,b)=>b.round-a.round||b.slot-a.slot)[0];
    t.champion = last && last.winner ? winnerTeamId(last, t.matches) : null;
  }
  function allPlayed(t){ return t.matches.every(m=>m.winner||m.bye||m.scoreA!=null); }

  // ---- round robin standings ----
  function standings(t){
    const rec={};
    t.teamIds.forEach(id=>rec[id]={teamId:id,w:0,l:0,played:0,rf:0,ra:0});
    t.matches.forEach(m=>{
      if(m.winner==null||m.scoreA==null) return;
      const aId=teamInSlot(m.a,t.matches), bId=teamInSlot(m.b,t.matches);
      if(!aId||!bId) return;
      rec[aId].played++; rec[bId].played++;
      rec[aId].rf+=m.scoreA; rec[aId].ra+=m.scoreB;
      rec[bId].rf+=m.scoreB; rec[bId].ra+=m.scoreA;
      if(m.winner==='a'){ rec[aId].w++; rec[bId].l++; }
      else { rec[bId].w++; rec[aId].l++; }
    });
    return Object.values(rec).map(r=>({...r,diff:r.rf-r.ra,
      pct:r.played?r.w/r.played:0})).sort((a,b)=>b.pct-a.pct||b.diff-a.diff);
  }

  // group matches by round for rendering
  function rounds(t, bracket){
    const ms=t.matches.filter(m=>!bracket||m.bracket===bracket);
    const byRound={};
    ms.forEach(m=>{ (byRound[m.round]=byRound[m.round]||[]).push(m); });
    return Object.keys(byRound).map(Number).sort((a,b)=>a-b)
      .map(r=>({round:r, matches:byRound[r].sort((a,b)=>a.slot-b.slot)}));
  }
  function roundName(t, round, totalRounds){
    const fromEnd=totalRounds-round;
    if(fromEnd===0) return 'Final';
    if(fromEnd===1) return 'Semifinals';
    if(fromEnd===2) return 'Quarterfinals';
    return `Round ${round}`;
  }

  return { FORMATS, all, byId, create, remove, setResult, clearResult,
           teamInSlot, winnerTeamId, standings, rounds, roundName,
           nextPow2, seedOrder };
})();
const ord = n => n+(['th','st','nd','rd'][(n%100>>3^1&&n%10)||0]||'th');
const toast = (()=>{ let t; return msg=>{
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(t); t=setTimeout(()=>el.classList.remove('show'),1400);
};})();

/* ---- apply an action with undo snapshot ---- */
function act(name, meta){
  const g = Store.get().game;
  if(!g || g.final) return;
  if(!g._undo) g._undo=[];
  const runsBefore = g.totals.away.r + g.totals.home.r;
  // snapshot (cheap clone of mutable bits)
  g._undo.push(JSON.stringify({
    inning:g.inning,half:g.half,outs:g.outs,balls:g.balls,strikes:g.strikes,
    bases:g.bases,battingIndex:g.battingIndex,line:g.line,totals:g.totals,
    eventsLen:g.events.length
  }));
  if(g._undo.length>40) g._undo.shift();
  g._basesBefore = g.bases.slice();   // snapshot for visual replay
  Engine.actions[name](g, meta);
  const runsAfter = g.totals.away.r + g.totals.home.r;
  Store.commit();
  navigator.vibrate && navigator.vibrate(name==='homer'?[10,40,20]:8);
  // celebrate scoring plays
  if(name==='homer'){ fxHomeRun(); }
  else if(runsAfter>runsBefore){ fxScorePop(); }
}

/* ---- Interactive play builder: arm a play, tap field to set location ---- */
let pendingPlay = null;   // {action, label, bbType}
let smartSuggestion = null; // transient hint shown after an auto-advance
let replayGameRef = null; // game currently shown in scorebook
let replayIndex = null;   // event index being replayed

/* ---- Visual play replay viewer ---- */
function replayableIndices(g){
  const out=[];
  g.events.forEach((e,i)=>{ if(e.basesBefore!=null && (e.hx!=null||hasMovement(e))) out.push(i); });
  return out;
}
function openReplay(evIndex){

  renderReplay();
}
function renderReplay(){
  const g=replayGameRef; if(!g||replayIndex==null) return;
  const e=g.events[replayIndex];
  const idxs=replayableIndices(g);
  const pos=idxs.indexOf(replayIndex);
  const prevIdx=pos>0?idxs[pos-1]:null;
  const nextIdx=pos<idxs.length-1?idxs[pos+1]:null;

  const scoreLine = e.scoreAfter?`${esc(g.away.name)} ${e.scoreAfter.away} — ${e.scoreAfter.home} ${esc(g.home.name)}`:'';
  const rbi=e.rbi?` · ${e.rbi} RBI`:'';
  const loc=e.zoneName||e.zone||'';

  Sheet.open(`
    <div class="sheet-head">
      <h3>Play Replay</h3>
      <button class="x" onclick="Sheet.close()">×</button>
    </div>
    <div class="sheet-body" style="padding-top:0">
      <div class="replay-meta">
        <div class="replay-inning">${ord(e.i)} · ${e.half==='top'?'Top':'Bottom'}</div>
        <div class="replay-play"><b>${esc(e.batter||'')}</b> — ${esc(e.label)}${loc?` to ${esc(loc)}`:''}${rbi}</div>
        ${scoreLine?`<div class="replay-score">${scoreLine}</div>`:''}
      </div>
      <div class="replay-fieldwrap">${Field.replayField(e)}</div>
      <div class="replay-legend">
        <span><i style="background:#ffc94d"></i>Ball flight</span>
        <span><i style="background:#3ddc84"></i>Batter</span>
        <span><i style="background:#4d9fff"></i>Runner</span>
      </div>
      <div class="replay-nav">
        <button ${prevIdx==null?'disabled':''} onclick="openReplay(${prevIdx})">‹ Prev</button>
        <span class="replay-count">${pos+1} / ${idxs.length}</span>
        <button ${nextIdx==null?'disabled':''} onclick="openReplay(${nextIdx})">Next ›</button>
      </div>

}

function armPlay(action, label){
  const g=Store.get().game;
  if(!g||g.final) return;
  // map default batted-ball type
  const bbType = action==='groundout' ? 'ground'
               : action==='flyout' ? 'fly'
               : (action==='homer' ? 'fly' : null);
  pendingPlay = {action, label, bbType};
  render();
  navigator.vibrate && navigator.vibrate(6);
}
function cancelPlay(){ pendingPlay=null; render(); }

// preview marker shown while arming (none yet until they tap)
function currentPlayMarkers(){ return []; }

// tap on the field while armed -> compute zone, commit play with location
function onFieldTap(evt, svg){
  if(!pendingPlay) return;
  const pt=svgPoint(evt, svg);
  if(!pt) return;
  const zone=Field.zoneFor(pt.x, pt.y);
  commitPlay({x:+pt.x.toFixed(1), y:+pt.y.toFixed(1), zone:zone.code, zoneName:zone.name,
              area:zone.area, bbType:pendingPlay.bbType});
}
// convert a click/touch on the SVG into 0..100 field coords
function svgPoint(evt, svg){
  const rect=svg.getBoundingClientRect();
  const cx=(evt.touches?evt.touches[0].clientX:evt.clientX);
  const cy=(evt.touches?evt.touches[0].clientY:evt.clientY);
  if(cx==null) return null;
  // viewBox is 0..100 with xMidYMid meet; rect is square-ish — map directly
  const x=((cx-rect.left)/rect.width)*100;
  const y=((cy-rect.top)/rect.height)*100;
  return {x:Math.max(0,Math.min(100,x)), y:Math.max(0,Math.min(100,y))};
}

function commitPlay(location){
  const pp=pendingPlay; if(!pp){ return; }
  pendingPlay=null;
  const g=Store.get().game;
  const basesBefore = g ? g.bases.slice() : [null,null,null];
  const isHit = ['single','double','triple','homer'].includes(pp.action);
  const meta={};
  if(location){
    meta.hx=location.x; meta.hy=location.y;
    meta.zone=location.zone; meta.zoneName=location.zoneName;
    if(location.bbType) meta.bbType=location.bbType;
  } else if(pp.bbType){ meta.bbType=pp.bbType; }
  act(pp.action, meta);          // fires the engine action (auto-advances runners)
  if(location){
    const z=location.zoneName||location.zone;
    toast(`${pp.label} · ${z}`);
  }
  // smart suggestion: if there were runners on before a hit, the engine
  // auto-advanced them by the standard amount — surface that the scorekeeper
  // can drag any runner to adjust (extra base taken, held up, thrown out).
  if(isHit && basesBefore.some(b=>b)){
    showPlaySuggestion(pp.label);
  }
}
function showPlaySuggestion(label){
  smartSuggestion = `Runners auto-advanced on the ${label.toLowerCase()}. Drag any runner to adjust.`;
  render();
  // auto-clear after a few seconds
  clearTimeout(window._suggTimer);
  window._suggTimer=setTimeout(()=>{ smartSuggestion=null; render(); }, 5000);
}

/* ---- Runner interaction: tap a base to manage that runner ---- */
function onBaseTap(baseIdx, evt){
  if(evt) evt.stopPropagation();
  if(pendingPlay) return;        // field is in hit-location mode
  const g=Store.get().game; if(!g||g.final) return;
  if(g.bases[baseIdx]==null) return;  // empty base, nothing to do
  const who=g.bases[baseIdx];

    <div class="sheet-head"><h3>Runner on ${baseName}</h3><button class="x" onclick="Sheet.close()">×</button></div>
    <div class="sheet-body">

      <div class="choice" style="grid-template-columns:1fr">
        <button onclick="runnerAdvance(${baseIdx},1)">Advance one base${baseIdx===2?' · SCORE':''}</button>
        ${baseIdx<2?`<button onclick="runnerAdvance(${baseIdx},${3-baseIdx})">Send home · SCORE</button>`:''}
        <button onclick="runnerSteal(${baseIdx})">Stolen base</button>

/* ============================================================
   RUNNER DRAG & DROP
   Runners are HTML pucks layered over the SVG diamond. Press-hold
   and drag to a base; release triggers a Safe/Out/Error/FC prompt.
   ============================================================ */
const DRAG_BASES = { 0:[68,68], 1:[50,58], 2:[32,68], 3:[50,86] }; // 3 = home
const DRAG_BASE_NAMES = {0:'1st',1:'2nd',2:'3rd',3:'home'};

function runnerOverlay(g){
  let pucks='';
  [0,1,2].forEach(i=>{
    if(g.bases[i]==null) return;
    const [x,y]=DRAG_BASES[i];
    const who=g.bases[i];
    pucks+=`<div class="runner-puck" data-base="${i}"
      style="left:${x}%;top:${y}%"
      onpointerdown="startRunnerDrag(event,${i})">
      <span class="puck-label">${esc(Crest.initials(String(who)))}</span>
    </div>`;
  });
  let zones='';
  [0,1,2,3].forEach(i=>{
    const [x,y]=DRAG_BASES[i];
    zones+=`<div class="drop-zone" data-zone="${i}" style="left:${x}%;top:${y}%"></div>`;
  });
  return `<div class="runner-layer" id="runnerLayer">${zones}${pucks}</div>`;
}

let dragRunner=null;
function startRunnerDrag(evt, fromBase){
  evt.preventDefault(); evt.stopPropagation();
  const g=Store.get().game; if(!g||g.final) return;
  const puck=evt.currentTarget;
  const layer=document.getElementById('runnerLayer');
  if(!layer) return;
  dragRunner={fromBase, who:g.bases[fromBase], puckEl:puck, layerEl:layer, moved:false};
  puck.classList.add('dragging');
  try{ puck.setPointerCapture(evt.pointerId); }catch(e){}
  navigator.vibrate && navigator.vibrate(8);
  layer.classList.add('dragging-active');

  const rect=layer.getBoundingClientRect();
  const move=e=>{
    const px=((e.clientX-rect.left)/rect.width)*100;
    const py=((e.clientY-rect.top)/rect.height)*100;
    dragRunner.moved=true;
    puck.style.left=px+'%'; puck.style.top=py+'%';
    const near=nearestBase(px,py);
    [...layer.querySelectorAll('.drop-zone')].forEach(z=>{
      z.classList.toggle('hot', +z.dataset.zone===near && near!==dragRunner.fromBase);
    });
  };
  const up=e=>{
    puck.removeEventListener('pointermove',move);
    puck.removeEventListener('pointerup',up);
    puck.removeEventListener('pointercancel',up);
    layer.classList.remove('dragging-active');
    puck.classList.remove('dragging');
    const px=((e.clientX-rect.left)/rect.width)*100;
    const py=((e.clientY-rect.top)/rect.height)*100;
    const target=nearestBase(px,py);
    const dr=dragRunner; dragRunner=null;
    if(!dr.moved || target===dr.fromBase || target==null){
      render();
      if(!dr.moved) onBaseTap(dr.fromBase);
      return;
    }
    promptRunnerOutcome(dr.fromBase, target);
  };
  puck.addEventListener('pointermove',move);
  puck.addEventListener('pointerup',up);
  puck.addEventListener('pointercancel',up);
}
function nearestBase(px,py){
  let best=null, bd=Infinity;
  [0,1,2,3].forEach(i=>{
    const [x,y]=DRAG_BASES[i];
    const d=Math.hypot(px-x,py-y);
    if(d<bd){ bd=d; best=i; }
  });
  return bd<16 ? best : null;
}
function promptRunnerOutcome(fromBase, toBase){
  const g=Store.get().game; if(!g){ render(); return; }
  const who=g.bases[fromBase];
  const dest=DRAG_BASE_NAMES[toBase];
  const scoring = toBase===3;
  Sheet.open(`
    <div class="sheet-head"><h3>${esc(String(who))} → ${dest}</h3><button class="x" onclick="cancelRunnerDrop()">×</button></div>
    <div class="sheet-body">
      <p style="color:var(--ink-dim);font-size:13px;margin:0 0 14px">How did the play end?</p>
      <div class="outcome-grid">
        <button class="oc safe" onclick="resolveRunner(${fromBase},${toBase},'safe')">
          <span class="oc-ic">✓</span>SAFE${scoring?'<small>scores</small>':`<small>to ${dest}</small>`}</button>
        <button class="oc out" onclick="resolveRunner(${fromBase},${toBase},'out')">
          <span class="oc-ic">✕</span>OUT<small>tagged / forced</small></button>
        <button class="oc err" onclick="resolveRunner(${fromBase},${toBase},'error')">
          <span class="oc-ic">E</span>ERROR<small>advances on error</small></button>
        <button class="oc fc" onclick="resolveRunner(${fromBase},${toBase},'fc')">
          <span class="oc-ic">FC</span>FIELDER'S<small>fielder's choice</small></button>
      </div>
      <button class="cta ghost" onclick="cancelRunnerDrop()">Cancel</button>
    </div>`);
}
function cancelRunnerDrop(){ Sheet.close(); render(); }
function resolveRunner(fromBase, toBase, outcome){
  Sheet.close();
  withUndo(g=>{
    const who=g.bases[fromBase];
    g.bases[fromBase]=null;
    const dest=DRAG_BASE_NAMES[toBase];
    if(outcome==='out'){
      g.outs++;
      g.events.push({type:'out',label:`${who} out at ${dest}`,i:g.inning,half:g.half,ts:Date.now()});
      if(g.outs>=3){ Engine.endHalfPublic(g); }
    } else {
      if(toBase>=3){ addRunUI(g); }
      else { g.bases[toBase]=who; }
      if(outcome==='error') g.totals[g.half==='top'?'home':'away'].e++;
      const tag = outcome==='error'?' (error)' : outcome==='fc'?' (FC)' : '';
      g.events.push({type:toBase>=3?'run':'adv',
        label:`${who} ${toBase>=3?'scores':'to '+dest}${tag}`,
        i:g.inning,half:g.half,ts:Date.now(),rbi:0});
    }
  });
  const verb = outcome==='out'?'Out recorded':(toBase>=3?'Run scored':'Runner advanced');
  toast(verb);
}

function runnerAdvance(baseIdx, n){
  Sheet.close();
  withUndo(g=>{
    let runs=0;
    let idx=baseIdx;
    const who=g.bases[idx];
    g.bases[idx]=null;
    const dest=idx+n;
    if(dest>=3){ runs++; addRunUI(g); }
    else g.bases[dest]=who;
    g.events.push({type:'adv',label:`Runner to ${['1st','2nd','3rd','home'][Math.min(dest,3)]}`,
      i:g.inning,half:g.half,ts:Date.now(),rbi:0});
  });
  toast('Runner advanced');
}
function runnerSteal(baseIdx){
  Sheet.close();
  withUndo(g=>{
    const who=g.bases[baseIdx];
    if(baseIdx===2){ g.bases[2]=null; addRunUI(g); }
    else { g.bases[baseIdx+1]=who; g.bases[baseIdx]=null; }
    g.events.push({type:'sb',label:'Stolen Base',i:g.inning,half:g.half,ts:Date.now()});
  });
  toast('Stolen base');
}
function runnerOut(baseIdx){
  Sheet.close();
  withUndo(g=>{
    g.bases[baseIdx]=null;
    g.outs++;
    g.events.push({type:'out',label:'Out on bases',i:g.inning,half:g.half,ts:Date.now()});
    if(g.outs>=3){ Engine.endHalfPublic(g); }
  });
  toast('Out recorded');
}
// helper: run a base mutation with an undo snapshot + commit + fx
function withUndo(fn){
  const g=Store.get().game; if(!g||g.final) return;
  if(!g._undo) g._undo=[];
  const runsBefore=g.totals.away.r+g.totals.home.r;
  g._undo.push(JSON.stringify({inning:g.inning,half:g.half,outs:g.outs,balls:g.balls,
    strikes:g.strikes,bases:g.bases,battingIndex:g.battingIndex,line:g.line,totals:g.totals,
    eventsLen:g.events.length}));
  if(g._undo.length>40) g._undo.shift();
  fn(g);
  const runsAfter=g.totals.away.r+g.totals.home.r;
  Store.commit();
  if(runsAfter>runsBefore) fxScorePop();
}
// add a run to the batting team (UI-side, mirrors engine addRun)
function addRunUI(g){
  const t=g.half==='top'?'away':'home';
  const arr=g.line[t]; while(arr.length<g.inning) arr.push(0);
  arr[g.inning-1]++; g.totals[t].r++;
}

function undo(){
  const g=Store.get().game;
  if(!g||!g._undo||!g._undo.length){ toast('Nothing to undo'); return; }
  const snap=JSON.parse(g._undo.pop());
  Object.assign(g,{inning:snap.inning,half:snap.half,outs:snap.outs,
    balls:snap.balls,strikes:snap.strikes,bases:snap.bases,
    battingIndex:snap.battingIndex,line:snap.line,totals:snap.totals});

/* ============================================================
   GAME MVP
   ============================================================ */
// suggest the best performer in a game using the same composite as season MVP
function suggestGameMvp(g){
  const box=Stats.gameBox(g);
  let best=null,bestScore=-1;
  ['away','home'].forEach(side=>{
    box.sides[side].batters.forEach(p=>{
      const b=p.line;
      const score=(b.h*1.5)+(b.tb*1)+(b.rbi*1.5)+(b.hr*2)+(b.bb*0.5);
      if(score>bestScore){ bestScore=score; best=p; }
    });
  });
  return best;
}
function openMvpPicker(gameId){
  const g=findGameById(gameId);
  if(!g){ setView('score'); return; }
  const box=Stats.gameBox(g);
  const all=[...box.sides.away.batters, ...box.sides.home.batters];
  const suggested=suggestGameMvp(g);
  Sheet.open(`
    <div class="sheet-head"><h3>Game MVP</h3><button class="x" onclick="skipMvp()">×</button></div>
    <div class="sheet-body">
      <p style="color:var(--ink-dim);font-size:13px;line-height:1.5;margin:2px 0 12px">
        Pick the standout performer. We've suggested the top line — tap any player to choose.</p>
      ${all.length?all.map(p=>{
        const b=p.line; const sel=suggested&&p.id===suggested.id;
        const r=Stats.resolve(p.id);
        const color=r?r.team.color:'#ff6b35';
        return `<div class="mvp-pick ${sel?'suggested':''}" onclick="setGameMvp('${gameId}','${p.id}')">
          <span class="avatar" style="width:42px;height:42px">${Crest.player(p.name,p.num,color,false)}</span>
          <div class="mvp-pick-info">
            <div class="mvp-pick-name">${esc(p.name)}${sel?' <span class="mvp-tag">SUGGESTED</span>':''}</div>
            <div class="mvp-pick-line">${mvpStatLine(b)}</div>
          </div>
        </div>`;
      }).join(''):`<div class="empty-sm">No attributed players in this game.</div>`}
      <button class="cta ghost" onclick="skipMvp()">Skip — no MVP</button>
    </div>`);
}
function mvpStatLine(b){
  const parts=[];
  parts.push(`${b.h}-${b.ab}`);
  if(b.b2) parts.push(`${b.b2} 2B`);
  if(b.b3) parts.push(`${b.b3} 3B`);
  if(b.hr) parts.push(`${b.hr} HR`);
  if(b.rbi) parts.push(`${b.rbi} RBI`);
  if(b.bb) parts.push(`${b.bb} BB`);
  return parts.join(' · ');
}
function setGameMvp(gameId, playerId){
  const g=findGameById(gameId);
  if(!g) return;
  g.mvpId=playerId;
  g.mvpSummary=generateMvpSummary(g, playerId);
  Store.commit(); Sheet.close();
  setView('score');
  const r=Stats.resolve(playerId);
  toast(`MVP: ${r?r.player.name:'selected'}`);
}
function skipMvp(){ Sheet.close(); setView('score'); toast('Game saved'); }
function findGameById(id){
  const s=Store.get();
  if(s.game&&s.game.id===id) return s.game;
  return s.history.find(g=>g.id===id);
}

// Template-based MVP write-up (swappable for a real LLM call in the cloud phase)
function generateMvpSummary(g, playerId){
  const box=Stats.gameBox(g);
  const all=[...box.sides.away.batters, ...box.sides.home.batters];
  const p=all.find(x=>x.id===playerId);
  if(!p) return '';
  const b=p.line;
  const r=Stats.resolve(playerId);
  const teamName=r?r.team.name:'their team';
  // figure out which side they're on + result
  const onAway=box.sides.away.batters.some(x=>x.id===playerId);
  const myRuns=onAway?g.totals.away.r:g.totals.home.r;
  const oppRuns=onAway?g.totals.home.r:g.totals.away.r;
  const won=myRuns>oppRuns;
  const oppName=onAway?g.home.name:g.away.name;

  // build the stat phrase
  const bits=[];
  const xbh=[];
  if(b.hr) xbh.push(`${b.hr} home run${b.hr>1?'s':''}`);
  if(b.b3) xbh.push(`${b.b3} triple${b.b3>1?'s':''}`);
  if(b.b2) xbh.push(`${b.b2} double${b.b2>1?'s':''}`);
  // lead with the slash line, optionally appending extra-base hits with "including"
  let lead=`going ${b.h}-for-${b.ab}`;
  if(xbh.length) lead+=` with ${joinList(xbh)}`;
  bits.push(lead);
  if(b.rbi) bits.push(`${b.rbi} RBI`);
  const statPhrase=joinList(bits);

  return `${p.name} earned Game MVP honors after ${statPhrase}, ${won?`helping lead ${teamName} to a ${myRuns}-${oppRuns} victory over ${oppName}.`:`in ${teamName}'s ${myRuns}-${oppRuns} contest against ${oppName}.`}`;
}
function joinList(arr){
  if(arr.length<=1) return arr.join('');
  if(arr.length===2) return arr.join(' and ');
  return arr.slice(0,-1).join(', ')+', and '+arr[arr.length-1];
}

// Build the batting roster. If a saved team is chosen, map back to real
// player records (keeping ids + positions). Otherwise parse the text box.
function resolveRoster(side,tid){
  if(tid){
    const t=Teams.byId(tid);
    const sel=document.getElementById(side+'LineupSel');
    let players;
    if(sel && sel.value!=='__full'){
      const l=Store.get().lineups.find(x=>x.id===sel.value);
      players=l?l.order.map(id=>Teams.playerById(t,id)).filter(Boolean):[];
    } else {
      players=[...t.players].filter(p=>p.pos!=='BN');
    }
    if(players.length) return players.map(p=>({id:p.id,num:p.num,name:p.name,pos:p.pos}));
  }
  return parseRoster(document.getElementById(side+'Roster').value);
}
function pickPitcher(roster){
  const p=roster.find(x=>x.pos==='P');
  return (p&&p.id)||null;
}
function parseRoster(txt){
  return (txt||'').split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{
    const m=l.match(/^(\d+)\s+(.*)$/);
    return m?{num:m[1],name:m[2]}:{num:'',name:l};
  });
}

function renderBook(g){
  replayGameRef = g;   // remember which game the scorebook is showing
  // group events by inning+half, preserving global index
  const groups={};
  g.events.forEach((ev,gi)=>{
    const k=`${ev.i}-${ev.half}`;
    (groups[k]=groups[k]||[]).push({ev,gi});
  });
  let html=`
    <div class="book-head" style="position:sticky;top:0;z-index:5">
      <span class="ttl">Digital Scorebook</span>
      <button class="tool" style="flex:0;padding:0 14px;min-height:36px" onclick="setView('score')">← LIVE</button>
    </div>
    ${lineScore(g)}`;

  const keys=Object.keys(groups).sort((a,b)=>{
    const [ai,ah]=a.split('-'),[bi,bh]=b.split('-');
    return ai-bi || (ah==='top'?-1:1)-(bh==='top'?-1:1);
  });
  if(!keys.length) html+=`<div class="subtle">No plays recorded yet. Head to the live tab and start tapping.</div>`;
  keys.forEach(k=>{
    const [i,half]=k.split('-');
    const evs=groups[k];
    const team = half==='top'?g.away.name:g.home.name;
    html+=`<div class="book-inning">
      <div class="book-head">
        <span class="ttl">${ord(+i)} · ${esc(team)}</span>
      </div>
      ${evs.map((x,idx)=>abRow(x.ev,idx+1,g,x.gi)).join('')}
    </div>`;
  });
  return html;
}

function abRow(e,seq,gameRef,evIndex){
  let cls='', tag='';
  if(e.type==='hit'){ tag=`<span class="tag h">${e.label}</span>`; }
  else if(['k','out','dp','fc','sac'].includes(e.type)){ tag=`<span class="tag o">OUT</span>`; }
  const rbi = e.rbi?` <b>${e.rbi} RBI</b>`:'';
  const score = e.rbi||e.type==='run';
  // a play is "replayable" if it has captured base snapshots
  const replayable = e.basesBefore!=null && (e.hx!=null || hasMovement(e));
  const loc = e.zoneName?`<span class="ab-loc">${e.zoneName}</span>`:(e.zone?`<span class="ab-loc">${e.zone}</span>`:'');
  const tap = replayable && evIndex!=null ? `onclick="openReplay(${evIndex})" style="cursor:pointer"` : '';
  return `<div class="ab ${replayable?'replayable':''}" ${tap}>
    <div class="seq">${seq}</div>
    <div class="body">
      <div class="batter">${esc(e.batter||'—')}${replayable?'<span class="play-icon">▶</span>':''}</div>
      <div class="res ${score?'score':''}"><b>${e.label}</b>${loc}${rbi}${tag}</div>
    </div>
  </div>`;
}
function hasMovement(e){
  if(!e.basesBefore||!e.basesAfter) return false;
  return JSON.stringify(e.basesBefore)!==JSON.stringify(e.basesAfter);
}

function lineScore(g){
  const n=Math.max(g.innings, g.line.away.length, g.line.home.length);
  const cells=arr=>{let s='';for(let i=0;i<n;i++){s+=`<td>${arr[i]!=null?arr[i]:'·'}</td>`;}return s;};
  return `<div class="linescore"><table>
    <tr><th class="tm">&nbsp;</th>${Array.from({length:n},(_,i)=>`<th>${i+1}</th>`).join('')}
      <th class="tot">R</th><th class="tot">H</th><th class="tot">E</th></tr>
    <tr><td class="tm">${esc(g.away.name)}</td>${cells(g.line.away)}
      <td class="tot">${g.totals.away.r}</td><td>${g.totals.away.h}</td><td>${g.totals.away.e}</td></tr>
    <tr><td class="tm">${esc(g.home.name)}</td>${cells(g.line.home)}

function fmtStatVal(fmt, v){
  if(fmt==='rate')  return v>=1?v.toFixed(3):('.'+Math.round(v*1000).toString().padStart(3,'0'));
  if(fmt==='rate2') return v.toFixed(2);
  if(fmt==='era')   return v.toFixed(2);
  if(fmt==='ip')    { const whole=Math.floor(v), rem=Math.round((v-whole)*3); return `${whole}.${rem}`; }

    onclick="setStatsSeason(${id==null?'null':`'${id}'`})">${esc(label)}</button>`;
  const seasonBar = seasons.length>1 ? `<div class="season-bar">
      ${chip(null,'All-Time')}
      ${seasons.slice().sort((a,b)=>b.created-a.created).map(s=>chip(s.id,s.name)).join('')}
    </div>` : '';

  const head = `${appbar()}
    <div class="sec" style="padding:8px 18px 4px"><h3>${statsMode==='awards'?'Awards & Records':'League Leaders'}</h3>
      <span class="more" onclick="openSeasonManager()">Seasons</span></div>
    <div class="stats-toggle three">
      <button class="${statsMode==='bat'?'sel':''}" onclick="setStatsMode('bat')">⚾ Batting</button>
      <button class="${statsMode==='pitch'?'sel':''}" onclick="setStatsMode('pitch')">🔥 Pitching</button>
      <button class="${statsMode==='awards'?'sel':''}" onclick="setStatsMode('awards')">🏆 Awards</button>
    </div>
    ${seasonBar}`;

  if(statsMode==='awards') return head + renderAwards();

  const cats = statsMode==='bat'?BAT_CATS:PITCH_CATS;
  const kind = statsMode==='bat'?'bat':'pitch';
  const withSeason = c => Object.assign({}, c.opts||{}, statsSeasonId?{seasonId:statsSeasonId}:{});
  const anyData = cats.some(c=>Stats.leaderTable(kind,c.stat,withSeason(c)).length>0);

  let html = head + `<div class="scroll stagger" style="padding-bottom:24px">`;

  if(!anyData){
    html += `<div class="empty"><div class="glyph">📊</div><h2>No Stats Yet</h2>
      <p>Score a game with saved teams and ${statsMode==='bat'?'batting':'pitching'} leaders will populate automatically.</p></div></div>`;
    return html;
  }

  cats.forEach(c=>{
    const rows = Stats.leaderTable(kind, c.stat, withSeason(c));
    if(!rows.length) return;
    html += leaderboardCard(c, rows);
  });
  html += `</div>`;
  return html;
}

function setStatsMode(m){ statsMode=m; render(); }
function setStatsSeason(id){ statsSeasonId=id; render(); }

function renderAwards(){
  const awards = Awards.seasonAwards(statsSeasonId);
  const records = Awards.teamRecords(statsSeasonId);

  if(!awards.length && !records.length && !mvpHist.length){
    return `<div class="scroll"><div class="empty"><div class="glyph">🏆</div><h2>No Awards Yet</h2>
      <p>Awards and team records unlock automatically as games are scored${statsSeasonId?' this season':''}.</p></div></div>`;
  }

  const trophy = {
    'MVP':'👑','Offensive Player of the Year':'💥','Pitcher of the Year':'🔥',

      html += `<div class="award-card" onclick="openPlayerCard('${a.teamId}','${a.playerId}')">

        </div>
        <span class="avatar award-av">${Crest.player(a.name,a.num,a.color,false)}</span>
      </div>`;
    });
  }

  if(records.length){
    html += `<div class="sec"><h3>Team Records${scope}</h3></div>
      <div class="rec-list">`;
    records.forEach(r=>{
      html += `<div class="rec-row">
        <div class="rec-info">
          <div class="rec-label">${esc(r.label)}</div>
          <div class="rec-sub">${esc(r.team)} · ${esc(r.sub)}</div>
        </div>
        <div class="rec-val">${esc(String(r.value))}</div>
      </div>`;
    });
    html += `</div>`;
  }

  const mvps = mvpHist;
  if(mvps.length){
    html += `<div class="sec"><h3>Game MVP Leaders${scope}</h3></div>
      <div class="rec-list">`;
    mvps.forEach((m,i)=>{
      html += `<div class="rec-row" onclick="openPlayerCard('${m.teamId}','${m.playerId}')" style="cursor:pointer">
        <span class="lb-rank" style="${i===0?'color:var(--gold)':''}">${i+1}</span>

        </div>
        <div class="rec-val">${m.total}<span style="font-size:11px;color:var(--ink-dim);font-weight:700"> 🏆</span></div>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<div class="handoff" style="margin-top:8px">Awards recompute live from every scored game</div></div>`;
  return html;
}

  return `<div class="lb-card">
    <div class="lb-head">
      <span class="lb-cat">${cat.label}</span>
      ${rows.length>5?`<span class="lb-more" onclick="openLeaderList('${cat.stat}','${cat.label.replace(/'/g,"")}','${cat.fmt}')">All ${rows.length}</span>`:''}
    </div>
    <div class="lb-leader" onclick="openPlayerCard('${top.teamId}','${top.id}')">
      <span class="lb-rank">1</span>
      <span class="avatar lb-av">${Crest.player(top.name,top.num,top.color,false)}</span>
      <div class="lb-who">
        <div class="lb-name">${esc(top.name)}</div>
        <div class="lb-team">${esc(top.teamName)}</div>
      </div>
      <span class="lb-val">${fmtStatVal(cat.fmt, top.val)}<small>${cat.short}</small></span>

    ${rest.length?`<div class="lb-rest">${rest.map((r,i)=>`
      <div class="lb-row" onclick="openPlayerCard('${r.teamId}','${r.id}')">

}

function openLeaderList(stat, label, fmt){
  const kind = statsMode==='bat'?'bat':'pitch';

/* ---- Season manager: create/switch the active season for new games ---- */
function openSeasonManager(){
  const s=Store.get();
  const seasons=(s.seasons||[]).slice().sort((a,b)=>b.created-a.created);
  Sheet.open(`
    <div class="sheet-head"><h3>Seasons</h3><button class="x" onclick="Sheet.close()">×</button></div>
    <div class="sheet-body">

      ${seasons.map(season=>{
        const active=season.id===s.currentSeasonId;
        const gameCount=(s.history||[]).filter(g=>g.seasonId===season.id).length;
        return `<div class="pl-row" style="border:1px solid ${active?'var(--clay)':'var(--line)'};border-radius:12px;margin-bottom:8px;padding:12px 14px">
          <span class="pl-info"><div class="pl-name">${esc(season.name)}${active?' <span style="color:var(--clay);font-size:11px">● ACTIVE</span>':''}</div>

        </div>`;
      }).join('')}
      <button class="cta" onclick="createSeason()">＋ New Season</button>
    </div>`);
}
function createSeason(){
  const name=prompt('Season name:', 'Season '+((Store.get().seasons||[]).length+1));
  if(!name) return;
  const season={id:'s'+Date.now(), name:name.trim()||'Season', created:Date.now()};
  Store.get().seasons.push(season);
  Store.get().currentSeasonId=season.id;
  Store.commit(); openSeasonManager();
  toast('Created & activated '+season.name);
}
function activateSeason(id){
  Store.get().currentSeasonId=id;
  Store.commit(); openSeasonManager(); render();
  toast('Active season changed');
}

   ============================================================ */
function openBoxScore(g){
  g = g || Store.get().game;
  if(!g){ toast('No active game'); return; }
  Sheet.open(`
    <div class="sheet-head"><h3>Box Score</h3><button class="x" onclick="Sheet.close()">×</button></div>
    <div class="sheet-body" style="padding:0 0 24px">${boxScoreHTML(g)}</div>`);
}
function boxScoreHTML(g){
  const box=Stats.gameBox(g);
  const fmt3=v=>(v>=1?v.toFixed(3):('.'+Math.round(v*1000).toString().padStart(3,'0')));
  // line score + R/H/E/LOB totals
  let html=`<div style="padding:0 0 4px">${lineScore(g)}</div>
    <div class="box-totals">
      ${boxTotalRow(g.away.name, box.totals.away)}
      ${boxTotalRow(g.home.name, box.totals.home)}
    </div>`;

  // for each side: batting then pitching
  [['away',g.away.name],['home',g.home.name]].forEach(([side,name])=>{
    const s=box.sides[side];
    if(s.batters.length){
      html+=`<div class="box-sec">${esc(name)} · Batting</div>
        <div class="box-table">
          <div class="bx-row bx-head"><span class="bx-name">Batter</span>
            <span>AB</span><span>R</span><span>H</span><span>RBI</span><span>BB</span><span>SO</span><span>AVG</span></div>
          ${s.batters.map(p=>{const b=p.line;
            // season AVG for context
            const sb=Stats.playerBatting(p.id,true);
            return `<div class="bx-row">
              <span class="bx-name">${esc(p.name)}${p.num?` <i>#${p.num}</i>`:''}</span>
              <span>${b.ab}</span><span>${rbiRunsApprox(g,p.id)}</span><span>${b.h}</span>
              <span>${b.rbi}</span><span>${b.bb}</span><span>${b.k}</span><span>${fmt3(Stats.avg(sb))}</span>
            </div>`;}).join('')}
        </div>`;
    }
    if(s.pitchers.length){
      html+=`<div class="box-sec">${esc(name)} · Pitching</div>
        <div class="box-table">
          <div class="bx-row bx-head pitch"><span class="bx-name">Pitcher</span>
            <span>IP</span><span>H</span><span>R</span><span>BB</span><span>SO</span><span>ERA</span></div>
          ${s.pitchers.map(p=>{const pl=p.line;
            const sp=Stats.playerPitching(p.id,true);
            return `<div class="bx-row pitch">
              <span class="bx-name">${esc(p.name)}${p.num?` <i>#${p.num}</i>`:''}</span>
              <span>${Stats.ipStr(pl)}</span><span>${pl.h}</span><span>${pl.r}</span>
              <span>${pl.bb}</span><span>${pl.k}</span><span>${Stats.era(sp).toFixed(2)}</span>
            </div>`;}).join('')}
        </div>`;
    }
  });
  html+=`<div class="handoff" style="margin-top:10px">Updates live after every play</div>`;
  return html;
}
function boxTotalRow(name,t){
  return `<div class="bxt-row">
    <span class="bxt-name">${esc(name)}</span>
    <span class="bxt-cell"><b>${t.r}</b><i>R</i></span>
    <span class="bxt-cell"><b>${t.h}</b><i>H</i></span>
    <span class="bxt-cell"><b>${t.e}</b><i>E</i></span>
    <span class="bxt-cell"><b>${t.lob}</b><i>LOB</i></span>
  </div>`;
}

// downscale + compress uploaded image to a square data URL (keeps storage small)
function onLogoPick(evt){
  const file=evt.target.files&&evt.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const size=256;
      const canvas=document.createElement('canvas');
      canvas.width=size; canvas.height=size;
      const ctx=canvas.getContext('2d');
      // cover-crop to square
      const scale=Math.max(size/img.width, size/img.height);
      const w=img.width*scale, h=img.height*scale;
      ctx.drawImage(img,(size-w)/2,(size-h)/2,w,h);
      const dataUrl=canvas.toDataURL('image/jpeg',0.82);
      window._teamLogo=dataUrl;
      const prev=document.getElementById('logoPreview');
      if(prev) prev.innerHTML=logoPreviewHTML(dataUrl);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function clearLogo(){
  window._teamLogo=null;
  const prev=document.getElementById('logoPreview');
  if(prev) prev.innerHTML=logoPreviewHTML(null);

/* ---- drag-and-drop (pointer-based, works on touch) ---- */
let dragState=null;
function initLineupDnD(){
  const list=document.getElementById('luList'); if(!list) return;
  list.querySelectorAll('.lu-slot').forEach(slot=>{
    const grip=slot.querySelector('[data-grip]');
    if(!grip) return;
    grip.addEventListener('pointerdown',e=>startDrag(e,slot,list));
  });
}
function startDrag(e,slot,list){
  e.preventDefault();
  const pid=slot.dataset.pid;
  slot.classList.add('dragging');
  dragState={pid,list};
  navigator.vibrate&&navigator.vibrate(8);
  const move=ev=>{
    const y=ev.clientY;
    const slots=[...list.querySelectorAll('.lu-slot')];
    slots.forEach(s=>s.classList.remove('over'));
    const target=slots.find(s=>{
      if(s===slot) return false;
      const r=s.getBoundingClientRect();
      return y>=r.top && y<=r.bottom;
    });
    if(target) target.classList.add('over');
    dragState.target=target;
  };
  const up=()=>{
    document.removeEventListener('pointermove',move);
    document.removeEventListener('pointerup',up);
    const l=getLineup();
    if(dragState.target){
      const from=l.order.indexOf(dragState.pid);
      const to=l.order.indexOf(dragState.target.dataset.pid);
      l.order.splice(from,1);
      l.order.splice(to,0,dragState.pid);
      Store.commit();
    }
    dragState=null; render();
  };
  document.addEventListener('pointermove',move);
  document.addEventListener('pointerup',up);
}
