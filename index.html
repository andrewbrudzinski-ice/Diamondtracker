<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0d14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DiamondTracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@600;700&family=Archivo:wght@500;600;700;800;900&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="aurora" aria-hidden="true"></div>
<div class="ptr" id="ptr" aria-hidden="true"><span class="ptr-ic">↻</span></div>
<div class="splash" id="splash">
  <div class="splash-mark">⚾</div>
  <div class="splash-word">Diamond<b>Tracker</b></div>
  <div class="splash-bar"><i></i></div>
</div>
<div class="app" id="app"></div>

<!-- sheet host -->
<div class="sheet-wrap" id="sheetWrap" onclick="if(event.target===this)Sheet.close()">
  <div class="sheet" id="sheet"></div>
</div>
<div class="toast" id="toast"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
